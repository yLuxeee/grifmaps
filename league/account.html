<!doctype html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Account</title><link rel='stylesheet' href='styles.css'></head><body>
<nav class='navbar'><div class='container nav-inner'><a class='brand' href='index.html'>Grifmaps League</a><div class='links'><a data-page='league' href='index.html'>League</a><a data-page='players' href='players.html'>Players</a><a data-page='teams' href='teams.html'>Teams</a><a data-page='standings' href='standings.html'>Standings</a><a data-page='rules' href='rules.html'>Rules</a><a data-page='account' href='account.html'>Account</a></div></div></nav>
<main class='container'><section class='card'><h1>Captain Account</h1><p>Customize your team card and page appearance.</p><form id='profileForm' class='grid two'>
<div><label>Your captain name</label><input id='captainName' required></div>
<div><label>Team to edit</label><select id='teamSelect'></select></div>
<div><label>Banner image URL (optional)</label><input id='banner' placeholder='https://...'></div>
<div><label>Team colors (comma separated)</label><input id='colors' placeholder='#2f80ed,#56ccf2'></div>
<div style='grid-column:1/-1'><label>Team comment</label><textarea id='comment' rows='4'></textarea></div>
<div style='grid-column:1/-1'><button type='submit'>Save team profile</button></div></form></section></main>
<script type='module'>
import { loadLeague, saveLeague, setActiveNav } from './app.js';
setActiveNav('account');
const d=loadLeague();
const sel=document.getElementById('teamSelect');
const captains=d.signups.filter(s=>s.wantsCaptain && s.teamName);
sel.innerHTML=captains.map(c=>`<option value='${c.teamName}'>${c.teamName}</option>`).join('');
const bannerEl=document.getElementById('banner'); const colorsEl=document.getElementById('colors'); const commentEl=document.getElementById('comment');
function hydrate(){ const team=sel.value; const p=d.profiles[team]||{banner:'',colors:'#2f80ed,#56ccf2',comment:''}; bannerEl.value=p.banner||''; colorsEl.value=p.colors||''; commentEl.value=p.comment||''; }
sel.addEventListener('change',hydrate); hydrate();
document.getElementById('profileForm').addEventListener('submit',(e)=>{ e.preventDefault(); const cName=document.getElementById('captainName').value.trim(); const team=sel.value; const owner=captains.find(c=>c.teamName===team); if(!owner||owner.player.toLowerCase()!==cName.toLowerCase()) return alert('Captain name does not match team owner.'); d.profiles[team]={banner:bannerEl.value.trim(),colors:colorsEl.value.trim(),comment:commentEl.value.trim()}; saveLeague(d); alert('Profile updated.'); });
</script></body></html>
