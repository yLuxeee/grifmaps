<!doctype html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Standings</title><link rel='stylesheet' href='styles.css'></head><body>
<nav class='navbar'><div class='container nav-inner'><a class='brand' href='index.html'>Grifmaps League</a><div class='links'><a data-page='league' href='index.html'>League</a><a data-page='players' href='players.html'>Players</a><a data-page='teams' href='teams.html'>Teams</a><a data-page='standings' href='standings.html'>Standings</a><a data-page='rules' href='rules.html'>Rules</a><a data-page='account' href='account.html'>Account</a></div></div></nav>
<main class='container'><section class='card'><h1>Standings</h1><table class='table'><thead><tr><th>#</th><th>Team</th><th>LP</th><th>Wins</th><th>Losses</th></tr></thead><tbody id='rows'></tbody></table></section></main>
<script type='module'>import { loadLeague,setActiveNav } from './app.js'; setActiveNav('standings'); const d=loadLeague(); const sorted=Object.entries(d.stats).sort((a,b)=>b[1].lp-a[1].lp); document.getElementById('rows').innerHTML=sorted.map(([n,s],i)=>`<tr><td>${i+1}</td><td>${n}</td><td>${s.lp}</td><td>${s.wins}</td><td>${s.losses}</td></tr>`).join('');</script>
</body></html>
