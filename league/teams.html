<!doctype html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Teams</title><link rel='stylesheet' href='styles.css'></head><body>
<nav class='navbar'><div class='container nav-inner'><a class='brand' href='index.html'>Grifmaps League</a><div class='links'><a data-page='league' href='index.html'>League</a><a data-page='players' href='players.html'>Players</a><a data-page='teams' href='teams.html'>Teams</a><a data-page='standings' href='standings.html'>Standings</a><a data-page='rules' href='rules.html'>Rules</a><a data-page='account' href='account.html'>Account</a></div></div></nav>
<main class='container'><section class='card'><h1>Teams</h1><div class='grid two' id='teams'></div></section></main>
<script type='module'>import { loadLeague,getCaptains,setActiveNav } from './app.js'; setActiveNav('teams'); const d=loadLeague(); const el=document.getElementById('teams'); el.innerHTML=getCaptains(d).map(c=>{ const p=d.profiles[c.teamName]||{colors:'#7bb5ff,#8fe6ff',comment:''}; const b=p.banner||`linear-gradient(120deg, ${p.colors})`; return `<article class='team-card'><div class='team-banner' style='background:${b};${p.banner?'background-size:cover;background-position:center':''}'></div><div class='team-body'><h3>${c.teamName}</h3><div class='small'>Captain: ${c.player}</div><p>${p.comment||'No team comment yet.'}</p></div></article>`; }).join('') || '<p>No teams yet.</p>';</script>
</body></html>
