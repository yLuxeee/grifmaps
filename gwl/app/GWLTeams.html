<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GWL Teams</title>
  <style>
    :root { --bg:#d6dae3; --panel:#e8ecf3; --ink:#0b2a6e; --muted:#b8c4dd; }
    * { box-sizing: border-box; }
   body { margin:0; font-family:"Inter","Segoe UI",Arial,sans-serif; background:var(--bg); color:var(--ink); }
    .wrap { max-width:1720px; margin:18px auto; background:var(--panel); border:1px solid #bcc7dd; border-radius:14px; padding:24px; }
    h1 { margin:8px 0 20px; font-size:clamp(2.2rem,6vw,3.8rem); letter-spacing:1px; text-transform:uppercase; }
    .grid { display:grid; grid-template-columns:repeat(4,minmax(240px,1fr)); gap:18px; align-items:start; }
    .team-card { background:linear-gradient(180deg,#0a0f1f 0%,#02060f 100%); border:1px solid rgba(255,255,255,.12); overflow:hidden; position:relative; color:var(--accent); transition: filter .28s ease, opacity .28s ease, transform .28s ease; }
    .team-card::before { content:""; position:absolute; inset:0; background:repeating-linear-gradient(90deg,rgba(255,255,255,.02) 0 8px,transparent 8px 22px); pointer-events:none; }
    .team-top { min-height:540px; display:flex; flex-direction:column; justify-content:space-between; }
    .logo { height:290px; width:100%; padding:22px; }
    .meta { text-align:center; text-transform:uppercase; margin:0 12px 18px; }
    .city { font-size:1.7rem; font-weight:600; color:var(--muted); }
    .name { font-size:clamp(1.7rem,2.7vw,2.2rem); font-weight:700; line-height:1; margin-top:8px; }
    .roster-toggle { margin:0 10px 10px; border:2px solid currentColor; background:#000; color:inherit; width:calc(100% - 20px); padding:12px; font-family:inherit; font-size:1.1rem; font-weight:600; letter-spacing:.04em; text-transform:uppercase; cursor:pointer; }
    .roster-wrap { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px; padding:0 10px; background:#02060f; border-top:1px solid rgba(255,255,255,.12); position:relative; z-index:1; max-height:0; opacity:0; overflow:hidden; transform:translateY(-8px); transition:max-height .36s ease, opacity .28s ease, transform .28s ease, padding .28s ease; }
    .team-card.open .roster-wrap { max-height:360px; opacity:1; transform:translateY(0); padding:10px; }
    
    .grid.has-open .team-card:not(.open) { filter: blur(3px) grayscale(.25); opacity:.35; transform:scale(.985); pointer-events:none; }
    .player { background:#060b16; border:1px solid rgba(255,255,255,.08); padding:10px; text-transform:uppercase; }
    .real { color:#dbeafe; font-family:"Arial Narrow","Segoe UI",sans-serif; font-weight:700; font-size:.95rem; letter-spacing:.3px; margin-bottom:4px; }
    .tag { color:#fff; font-size:1.7rem; line-height:1; }
    @media (max-width:1280px) { .grid { grid-template-columns:repeat(2,minmax(240px,1fr)); } }
    @media (max-width:700px) { .grid { grid-template-columns:1fr; } .team-top { min-height:500px; } }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Meet the Teams</h1>
    <section class="grid" id="teamsGrid"></section>
  </main>
  <script>
    const teams = [
      { city: "Zero", name: "Logic", accent: "#22d3ee", logo: '<circle cx="160" cy="120" r="70" stroke="currentColor" stroke-width="20" fill="none"/><path d="M105 160l110-80" stroke="currentColor" stroke-width="20"/><text x="160" y="136" fill="#fff" text-anchor="middle" font-size="48" font-weight="900">ZL</text>', players:[['Senpai','Rebs'],['','PRIEST'],['Noah Diaz','Sev'],['Max','Mavbrid']] },
      { city: "Operation", name: "Doomsday", accent: "#ef4444", logo: '<polygon points="160,30 285,215 35,215" fill="none" stroke="currentColor" stroke-width="18"/><text x="160" y="150" fill="#fff" text-anchor="middle" font-size="42" font-weight="900">OD</text>', players:[['Black Jack','Death'],['Jon Snow','SHREK'],['Levi Phillps','Poptart'],['Dylan Williams','Dhlyn']] },
      { city: "Turquoise", name: "Jeep", accent: "#2dd4bf", logo: '<path d="M35 170q60-95 130-70t120-65" fill="none" stroke="currentColor" stroke-width="18"/><circle cx="80" cy="180" r="20" fill="none" stroke="currentColor" stroke-width="10"/><circle cx="260" cy="90" r="18" fill="none" stroke="currentColor" stroke-width="10"/><text x="160" y="150" fill="#fff" text-anchor="middle" font-size="34" font-weight="900">TJ</text>', players:[['Colton Wheeler','GINGY'],['Brian Sullivan','Rage'],['Derek Lewis','Killerz'],['Triston Tyler','Snipez']] },
      { city: "Paradox", name: "Warriors", accent: "#a78bfa", logo: '<path d="M40 40h120v120H40zM160 80h120v120H160z" fill="none" stroke="currentColor" stroke-width="16"/><text x="160" y="215" fill="#fff" text-anchor="middle" font-size="34" font-weight="900">PW</text>', players:[['Nolan Price','BLADE'],['Eric Young','FROST'],['Dante Ruiz','RIFT'],['Shawn Kane','EMBER']] },
      { city: "Like", name: "Clockwork", accent: "#f59e0b", logo: '<circle cx="110" cy="120" r="48" fill="none" stroke="currentColor" stroke-width="16"/><circle cx="215" cy="120" r="48" fill="none" stroke="currentColor" stroke-width="16"/><path d="M157 120h11" stroke="currentColor" stroke-width="12"/><text x="160" y="210" fill="#fff" text-anchor="middle" font-size="34" font-weight="900">LC</text>', players:[['Blake Torres','GEAR'],['Leo Voss','TICK'],['Ryan Pike','SHIFT'],['Chase Irwin','RATCHET']] },
      { city: "Cloud9", name: "Ascension", accent: "#0ea5e9", logo: '<path d="M45 160c20-70 55-95 115-95 62 0 96 30 116 95" fill="none" stroke="currentColor" stroke-width="18"/><circle cx="90" cy="160" r="22" fill="none" stroke="currentColor" stroke-width="10"/><circle cx="230" cy="160" r="22" fill="none" stroke="currentColor" stroke-width="10"/><text x="160" y="145" fill="#fff" text-anchor="middle" font-size="34" font-weight="900">C9</text>', players:[['Malli Jaskaran','CRAZE'],['Kaden Stockdale','EXCEED'],['Luis Rivera','FIRE'],['Logan Brown','LUROXX']] },
      { city: "Junkyard", name: "Dogs", accent: "#84cc16", logo: '<path d="M35 180l70-105 70 45 110-80" fill="none" stroke="currentColor" stroke-width="16"/><text x="160" y="210" fill="#fff" text-anchor="middle" font-size="34" font-weight="900">JD</text>', players:[['Brandon Yu','SAINTT'],['Victor Hale','SNAPS'],['Rico Miles','HOUND'],['Parker West','BARKER']] },
      { city: "Infinite", name: "Sigma", accent: "#38bdf8", logo: '<polygon points="60,180 160,40 260,180" fill="none" stroke="currentColor" stroke-width="16"/><text x="160" y="155" fill="#fff" text-anchor="middle" font-size="34" font-weight="900">IS</text>', players:[['Gavin York','SIGMA'],['Brett Lane','ARC'],['Allen Moss','POLAR'],['Isaiah Kim','VELOCITY']] },
      { city: "Panda", name: "Protocol", accent: "#f472b6", logo: '<path d="M45 75h230M65 130h190M85 185h150" stroke="currentColor" stroke-width="14"/><text x="160" y="150" fill="#fff" text-anchor="middle" font-size="34" font-weight="900">PP</text>', players:[['Harvey Dunn','BAMBOO'],['Nate Ellis','KUMA'],['Paul Finch','PAWS'],['Simon Webb','ZEN']] },
      { city: "Grifball", name: "Hub", accent: "#f43f5e", logo: '<path d="M60 170l100-100 100 100" fill="none" stroke="currentColor" stroke-width="16"/><path d="M160 70v140" stroke="currentColor" stroke-width="14"/><text x="160" y="212" fill="#fff" text-anchor="middle" font-size="34" font-weight="900">GH</text>', players:[['Colin Reed','ANCHOR'],['Myles Ford','SIGNAL'],['Dylan Nash','PULSE'],['Reese Hope','CORE']] }
    ];

    const grid = document.getElementById('teamsGrid');
    teams.forEach((team) => {
      const card = document.createElement('article');
      card.className = 'team-card';
      card.style.setProperty('--accent', team.accent);
      card.innerHTML = `
        <div class="team-top">
          <svg class="logo" viewBox="0 0 320 240">${team.logo}</svg>
          <div class="meta"><div class="city">${team.city}</div><div class="name">${team.name}</div></div>
          <button class="roster-toggle" type="button" aria-expanded="false">View Roster</button>
        </div>
        <div class="roster-wrap"></div>
      `;
      const roster = card.querySelector('.roster-wrap');
      team.players.forEach(([real, tag]) => {
        const player = document.createElement('div');
        player.className = 'player';
        player.innerHTML = `<div class="real">${real}</div><div class="tag">${tag}</div>`;
        roster.appendChild(player);
      });
      const btn = card.querySelector('.roster-toggle');
      btn.addEventListener('click', () => {
        const willOpen = !card.classList.contains('open');
          document.querySelectorAll('.team-card.open').forEach((openCard) => {
            openCard.classList.remove('open');
            const openBtn = openCard.querySelector('.roster-toggle');
            openBtn.textContent = 'View Roster';
            openBtn.setAttribute('aria-expanded', 'false');
          });
          if (willOpen) {
            card.classList.add('open');
            btn.textContent = 'Hide Roster';
            btn.setAttribute('aria-expanded', 'true');
            grid.classList.add('has-open');
          } else {
            grid.classList.remove('has-open');
          }
      });
      grid.appendChild(card);
    });
    if (!grid.querySelector('.team-card.open')) grid.classList.remove('has-open');
  </script>
</body>
</html>
