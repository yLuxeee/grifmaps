<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GWL Schedule</title>
  <style>
    :root{--bg:#d9d9d9;--blue:#2f6cf0;--text:#06111f;--muted:#7a8595}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);font-family:"Inter","Segoe UI",Arial,sans-serif;color:var(--text)}
    .wrap{max-width:1620px;margin:28px auto;padding:0 18px}
    .top{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;flex-wrap:wrap}
    h1{font-size:4rem;margin:8px 0 14px;letter-spacing:.5px;text-transform:uppercase}
    .filters{display:flex;gap:14px;flex-wrap:wrap;padding-top:10px}
    select{min-width:190px;padding:14px 44px 14px 14px;border:1px solid var(--blue);font:700 1.15rem Inter;background:#e7ebf3;color:var(--blue);text-transform:uppercase}
    .stage-tabs{display:flex;flex-wrap:wrap;gap:0;border-bottom:3px solid var(--blue);margin:8px -18px 0;padding:0 18px}
    .stage-tab{padding:14px 20px;border:0;background:transparent;font:700 1rem Inter;text-transform:uppercase;cursor:pointer}
    .stage-tab span{display:block;color:var(--text);font-size:.86rem;font-weight:600}
    .stage-tab.active{background:var(--blue);color:#fff}.stage-tab.active span{color:#d9e5ff}
    .controls{display:flex;justify-content:space-between;align-items:center;margin:34px 0 28px;gap:14px;flex-wrap:wrap}
    .status-tabs{display:flex}.status-tab{border:0;padding:14px 80px;background:#e2e2e2;font:700 1.7rem "Arial Narrow",sans-serif;text-transform:uppercase;cursor:pointer}
    .status-tab.active{background:var(--blue);color:#fff}
    .calendar{border:1px solid var(--blue);padding:14px 28px;background:transparent;color:var(--blue);font:700 1.5rem "Arial Narrow",sans-serif;text-transform:uppercase;cursor:pointer}
    h2{margin:0;font-size:3rem;text-transform:uppercase;line-height:.95}.sub{font-size:2rem;font-weight:700}
    #matches{display:grid;gap:10px;margin-top:24px}
    .match{background:#ececec;border:1px solid #d7d7d7}
    .main{display:grid;grid-template-columns:240px 1fr 220px;align-items:center;padding:14px 18px;gap:14px}
    .date{font:700 1.2rem Inter;text-transform:uppercase}.time{display:block;font-size:2rem;color:#10243f;margin-top:6px}
    .teams{display:flex;align-items:center;justify-content:center;gap:18px;font:700 1.7rem "Arial Narrow",sans-serif;text-transform:uppercase}
    .vs{color:var(--muted)} .pick{justify-self:end;color:var(--blue);font:700 1.5rem "Arial Narrow",sans-serif;text-transform:uppercase}
    .links{border-top:1px solid #ddd;padding:8px 12px;display:flex;justify-content:center;gap:14px;color:#4b5563;font-weight:700}
    .empty{padding:24px;background:#ececec;color:#5b6471;font-weight:600}
    .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;padding:18px;z-index:40}
    .modal-backdrop.open{display:flex}
    .modal{width:min(720px,100%);background:#efefef;border:1px solid #bfc5d3;padding:16px}
    .modal h3{margin:0 0 10px;font-size:3rem;text-transform:uppercase}
    .modal p{font:500 1.1rem/1.45 "Segoe UI",sans-serif;margin:0 0 14px;color:#1f2937}
    .modal-grid{display:grid;grid-template-columns:1fr 1.5fr;border:1px solid #111}
    .modal-head{background:#020617;color:#fff;padding:8px 10px;text-transform:uppercase;font:700 1rem Inter}
    .cell{padding:14px 10px;border-top:1px solid #d0d0d0}
    .team-big{font:700 2rem "Arial Narrow",sans-serif;text-transform:uppercase}
    .service-row{display:flex;gap:18px;flex-wrap:wrap;align-items:center}
    .service{border:0;background:transparent;cursor:pointer;text-transform:uppercase;color:#0f172a;font:700 .85rem Inter;display:grid;justify-items:center;gap:4px}
    .service b{font-size:1.8rem}
    .close-modal{margin-top:14px;width:100%;border:0;background:var(--blue);color:#fff;padding:14px;font:700 1.4rem "Arial Narrow",sans-serif;cursor:pointer;text-transform:uppercase}
    @media(max-width:1000px){h1{font-size:2.8rem}.main{grid-template-columns:1fr;justify-items:start}.teams{justify-content:flex-start;flex-wrap:wrap}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <h1>Schedule</h1>
      <div class="filters">
        <select id="season"><option>2026 Season</option><option>2025 Season</option></select>
        <select id="teamFilter"><option value="all">Select Team</option></select>
      </div>
    </div>
    <div class="stage-tabs" id="stageTabs"></div>
    <div class="controls">
      <div class="status-tabs"><button class="status-tab active" data-status="upcoming">Upcoming</button><button class="status-tab" data-status="completed">Completed</button></div>
      <button class="calendar" id="calendarBtn">Add to Calendar</button>
    </div>
    <div class="sub" id="stageLabel">Major I</div><h2>Qualifiers</h2>
    <section id="matches"></section>
  </main>

  <div class="modal-backdrop" id="calendarModal" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="calTitle">
      <h3 id="calTitle">Add to Calendar</h3>
      <p>Add your team schedule to your calendar by clicking one of the services below. You'll be prompted to download an ICS file to import into your calendar application.</p>
      <div class="modal-grid">
        <div class="modal-head">Team</div><div class="modal-head">Services</div>
        <div class="cell"><div id="modalTeam" class="team-big">Select Team</div></div>
        <div class="cell"><div class="service-row">
          <button class="service" data-service="google"><b>Ⓖ</b><span>Google</span></button>
          <button class="service" data-service="apple"><b></b><span>Apple</span></button>
          <button class="service" data-service="outlook"><b>Ⓞ</b><span>Outlook</span></button>
          <button class="service" data-service="other"><b>📅</b><span>Other</span></button>
        </div></div>
      </div>
      <button class="close-modal" id="closeModal">Close</button>
    </div>
  </div>
<script>
const stages=[
{name:'Entire Season',range:'Dec 5 - Jul 19'},
{name:'Summer Major I',range:'Jun 25 - Jun 28'},
{name:'Fall Major II',range:'Feb 13 - Mar 29'},
{name:'Winter Major III',range:'Apr 17 - May 17'},
{name:'Major IV',range:'May 29 - Jun 28'},
{name:'Post Season',range:'Jul 16 - Jul 19'}
];
const matches=[
{stage:'Major III',status:'upcoming',date:'Fri, May 1',time:'3:00 PM',a:'Operation: Doomsday',b:'Cloud9 Ascension'},
{stage:'Major III',status:'upcoming',date:'Fri, May 1',time:'4:30 PM',a:'Junkyard Dogs',b:'The Black List'},
{stage:'Major III',status:'upcoming',date:'Fri, May 1',time:'6:00 PM',a:'Hybrid Theory',b:'Easy As Pie'},
{stage:'Major III',status:'completed',date:'Thu, Apr 30',time:'7:00 PM',a:'Paradox Warriors',b:'Like Clockwork'},
{stage:'Major II',status:'completed',date:'Sat, Mar 28',time:'5:00 PM',a:'Zero Logic',b:'Turquoise Jeep'}
];
let stage='Entire Season',status='upcoming';
const tabs=document.getElementById('stageTabs'),list=document.getElementById('matches'),stageLabel=document.getElementById('stageLabel');
function buildTabs(){tabs.innerHTML='';stages.forEach((s,i)=>{const b=document.createElement('button');b.className='stage-tab'+(i===0?' active':'');b.innerHTML=`${s.name}<span>${s.range}</span>`;b.onclick=()=>{document.querySelectorAll('.stage-tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');stage=s.name;stageLabel.textContent=s.name==='Entire Season'?'Major III':s.name;render();};tabs.appendChild(b);});}
function fillTeams(){const set=new Set(matches.flatMap(m=>[m.a,m.b]));const sel=document.getElementById('teamFilter');[...set].sort().forEach(t=>{const o=document.createElement('option');o.value=t;o.textContent=t;sel.appendChild(o);});}
function render(){const team=document.getElementById('teamFilter').value;const rows=matches.filter(m=>(stage==='Entire Season'||m.stage===stage)&&m.status===status&&(team==='all'||m.a===team||m.b===team));list.innerHTML='';if(!rows.length){list.innerHTML='<div class="empty">No matches for this filter.</div>';return;}rows.forEach(m=>{const el=document.createElement('article');el.className='match';el.innerHTML=`<div class="main"><div class="date">${m.date}<span class="time">${m.time}</span></div><div class="teams"><span>${m.a}</span><span class="vs">VS</span><span>${m.b}</span></div></div><div class="links">Twitch · YouTube</div>`;list.appendChild(el);});}

document.querySelectorAll('.status-tab').forEach(btn=>btn.onclick=()=>{document.querySelectorAll('.status-tab').forEach(x=>x.classList.remove('active'));btn.classList.add('active');status=btn.dataset.status;render();});
document.getElementById('teamFilter').onchange=render;
initCalendarModal();

function initCalendarModal(){
  const modal=document.getElementById('calendarModal');
  const teamSel=document.getElementById('teamFilter');
  const teamText=document.getElementById('modalTeam');
  document.getElementById('calendarBtn').onclick=()=>{
    const team=teamSel.value;
    if(team==='all'){ alert('Please select a team first.'); return; }
    teamText.textContent=team;
    modal.classList.add('open');
    modal.setAttribute('aria-hidden','false');
  };
  document.getElementById('closeModal').onclick=()=>{modal.classList.remove('open');modal.setAttribute('aria-hidden','true');};
  modal.addEventListener('click',(e)=>{ if(e.target===modal){ modal.classList.remove('open');modal.setAttribute('aria-hidden','true'); } });
  document.querySelectorAll('.service').forEach(btn=>btn.onclick=()=>downloadICS(teamSel.value,btn.dataset.service));
}
function downloadICS(team,service){
  const teamMatches=matches.filter(m=>m.a===team||m.b===team);
  if(!teamMatches.length){alert('No matches found for selected team.');return;}
  const lines=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//GWL//Schedule//EN'];
  teamMatches.forEach((m,i)=>{const start=new Date('2026-05-01T15:00:00'); start.setDate(start.getDate()+i); const end=new Date(start.getTime()+60*60*1000); const dt=(d)=>d.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z'; lines.push('BEGIN:VEVENT','UID:'+team.replace(/\s+/g,'')+i+'@gwl','DTSTAMP:'+dt(new Date()),'DTSTART:'+dt(start),'DTEND:'+dt(end),'SUMMARY:'+m.a+' vs '+m.b,'DESCRIPTION:GWL '+m.stage+' ('+service+')','END:VEVENT');});
  lines.push('END:VCALENDAR');
  const blob=new Blob([lines.join('\r\n')],{type:'text/calendar'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=team.toLowerCase().replace(/\s+/g,'-')+'-schedule.ics';a.click();URL.revokeObjectURL(a.href);
}
buildTabs();fillTeams();render();
</script>
</body>
</html>
